<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    /* Report-specific: cover page */
    .cover-page {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      min-height: 29.7cm;
    }
    .cover-page h1 { font-size: 32pt; margin-bottom: 24pt; }
    .cover-page .cover-meta { font-size: 12pt; color: #666; line-height: 2; }

    /* Table of contents */
    .toc { margin: 24pt 0; }
    .toc h2 { margin-bottom: 12pt; }
    .toc-entry { display: block; padding: 4px 0; font-size: 11pt; color: #333; text-decoration: none; border-bottom: 1px dotted #ddd; }
    .toc-entry:hover { color: #000; }
    .toc-entry .toc-num { font-weight: 600; margin-right: 8px; }

    /* No interactive elements for print */
    @media print {
      .cover-page { page-break-after: always; }
    }
  </style>
</head>
<body>

  <!-- Cover Page -->
  <div class="page cover-page" id="cover">
    <!-- Rendered from JSON -->
  </div>

  <!-- Table of Contents -->
  <div class="page" id="toc-page">
    <div class="toc" id="toc"></div>
  </div>

  <!-- Content Pages -->
  <div class="page" id="content"></div>

  <script id="pd-data" type="application/json">{}</script>

  <script src="_base.js"></script>
  <script>
  (function() {
    var data = PDSpec.loadData();
    if (!data) return;

    document.title = data.title || 'Report';
    if (data.meta && data.meta.language) document.documentElement.lang = data.meta.language;

    // Cover page
    var cover = document.getElementById('cover');
    var h1 = document.createElement('h1');
    h1.textContent = data.title || 'Report';
    cover.appendChild(h1);

    var coverMeta = document.createElement('div');
    coverMeta.className = 'cover-meta';
    var meta = data.meta || {};
    coverMeta.innerHTML = PDSpec.esc(meta.project || '') + '<br>' +
      PDSpec.esc(meta.generated || '') + '<br>' +
      PDSpec.esc(meta.version || 'v1.0');
    cover.appendChild(coverMeta);

    // TOC + Content
    var toc = document.getElementById('toc');
    var tocH2 = document.createElement('h2');
    tocH2.textContent = meta.language === 'es' ? 'Tabla de Contenidos' : 'Table of Contents';
    toc.appendChild(tocH2);

    var content = document.getElementById('content');
    PDSpec.renderDocMeta(data.meta, content);

    if (data.sections) {
      data.sections.forEach(function(section, i) {
        // TOC entry
        var a = document.createElement('a');
        a.className = 'toc-entry';
        a.href = '#' + (section.id || 'section-' + i);
        a.innerHTML = '<span class="toc-num">' + (i+1) + '.</span> ' + PDSpec.esc(section.heading);
        toc.appendChild(a);

        // Section anchor
        var anchor = document.createElement('div');
        anchor.id = section.id || 'section-' + i;
        content.appendChild(anchor);
      });

      // Render all sections
      PDSpec.renderSections(data, content);
    }
  })();
  </script>
</body>
</html>
