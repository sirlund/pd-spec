<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/theme/white.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    .reveal { font-family: 'Inter', sans-serif; }
    .reveal h1, .reveal h2, .reveal h3 { font-family: 'Inter', sans-serif; color: #202124; }
    .reveal h1 { font-size: 2.2em; }
    .reveal h2 { font-size: 1.6em; }
    .reveal .slide-meta { font-size: 0.5em; color: #666; margin-top: 1em; }
    .reveal .callout {
      background-color: #e6fffa;
      border-left: 4px solid #00cea5;
      padding: 16px 20px;
      margin: 20px 0;
      text-align: left;
      font-size: 0.85em;
    }
    .reveal .callout p { margin: 0; }
    .reveal .ref-link { color: #555; text-decoration: none; border-bottom: 1px dotted #999; }
    .reveal .ref-link:hover { color: #111; border-bottom-color: #111; }
    .reveal .badge {
      display: inline-block; font-size: 0.6em; font-weight: 500;
      padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.03em;
    }
    .reveal .badge-verified { background: #d4edda; color: #155724; }
    .reveal .badge-pending { background: #fef3cd; color: #856404; }
    .reveal .gap-marker {
      font-size: 0.7em; color: #856404; background: #fff3cd;
      padding: 2px 6px; border-radius: 3px; border: 1px dashed #856404;
    }
    .reveal table { font-size: 0.75em; }
    .reveal th, .reveal td { border: 1px solid #c7c7c7; padding: 8px; text-align: left; }
    .reveal th { font-weight: 700; }
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides" id="slides">
      <!-- Rendered from JSON -->
    </div>
  </div>

  <script id="pd-data" type="application/json">{}</script>

  <script>
  // Minimal rendering without _base.js dependency (Reveal.js has its own structure)
  (function() {
    'use strict';
    var el = document.getElementById('pd-data');
    if (!el) return;
    var data;
    try { data = JSON.parse(el.textContent); } catch(e) { return; }
    if (!data) return;

    document.title = data.title || 'Presentation';
    if (data.meta && data.meta.language) document.documentElement.lang = data.meta.language;

    var slides = document.getElementById('slides');

    function esc(str) {
      if (typeof str !== 'string') return '';
      var e = document.createElement('span');
      e.textContent = str;
      return e.innerHTML;
    }

    function refsHtml(refs) {
      if (!refs || !refs.length) return '';
      return '<p class="slide-meta">' + refs.map(function(r){ return '['+r+']'; }).join(', ') + '</p>';
    }

    // Title slide
    var meta = data.meta || {};
    var titleSlide = '<section>';
    titleSlide += '<h1>' + esc(data.title || 'Presentation') + '</h1>';
    titleSlide += '<p class="slide-meta">' + esc(meta.project || '') + ' · ' + esc(meta.generated || '') + ' · ' + esc(meta.version || 'v1.0') + '</p>';
    titleSlide += '</section>';
    slides.insertAdjacentHTML('beforeend', titleSlide);

    // Content slides from sections
    if (data.sections) {
      data.sections.forEach(function(section) {
        var html = '<section>';
        html += '<h2>' + esc(section.heading) + '</h2>';

        switch(section.type) {
          case 'callout':
            html += '<div class="callout"><p>' + esc(section.content) + '</p></div>';
            break;
          case 'table':
            html += '<table><thead><tr>';
            (section.headers || []).forEach(function(h) { html += '<th>' + esc(h) + '</th>'; });
            html += '</tr></thead><tbody>';
            (section.rows || []).forEach(function(row) {
              html += '<tr>';
              row.forEach(function(cell) { html += '<td>' + esc(cell) + '</td>'; });
              html += '</tr>';
            });
            html += '</tbody></table>';
            break;
          case 'module-list':
            (section.items || []).forEach(function(mod) {
              html += '<p><strong>' + esc(mod.name) + '</strong>';
              if (mod.status) html += ' <span class="badge badge-' + esc(mod.status.toLowerCase()) + '">' + esc(mod.status) + '</span>';
              html += '</p>';
            });
            break;
          case 'gap':
            html += '<div class="gap-marker">[GAP — no source backing]</div>';
            if (section.content) html += '<p>' + esc(section.content) + '</p>';
            break;
          default: // text, open-questions
            if (section.content) {
              section.content.split(/\n\n+/).forEach(function(p) {
                html += '<p>' + esc(p.trim()) + '</p>';
              });
            }
            if (section.items) {
              html += '<ul>';
              section.items.forEach(function(q) { html += '<li>' + esc(typeof q === 'string' ? q : q.text || '') + '</li>'; });
              html += '</ul>';
            }
        }

        html += refsHtml(section.refs);

        // Speaker notes
        if (section.notes) {
          html += '<aside class="notes">' + esc(section.notes) + '</aside>';
        }

        html += '</section>';
        slides.insertAdjacentHTML('beforeend', html);
      });
    }

    // Convert refs to links (target="_blank" for presentations)
    slides.querySelectorAll('p, li, td, .callout, .slide-meta').forEach(function(el) {
      el.innerHTML = el.innerHTML.replace(
        /\[(IG-\d+|CF-\d+)\]/g,
        '<a href="STATUS.html#$1" class="ref-link" target="_blank">[$1]</a>'
      );
    });
  })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
  <script>
    Reveal.initialize({ hash: true, slideNumber: true });
  </script>
</body>
</html>
