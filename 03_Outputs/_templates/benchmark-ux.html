<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UX Benchmark</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    /* Benchmark UX — card grid layout */
    .category-section { margin-bottom: 32pt; }
    .category-section h2 {
      font-size: 16pt;
      font-weight: 700;
      color: #202124;
      margin: 0 0 16pt;
      padding-bottom: 6pt;
      border-bottom: 2px solid #e5e5e5;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .referent-card {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 16px;
      background: #fff;
    }

    .referent-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 10px;
    }
    .referent-header h3 {
      font-size: 12pt;
      font-weight: 600;
      color: #202124;
      margin: 0;
    }
    .industry-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 500;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      background: #e8eaed;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .factor-x {
      font-size: 0.9em;
      color: #333;
      margin-bottom: 8px;
      font-style: italic;
    }
    .factor-x strong {
      font-style: normal;
      color: #000;
    }

    .applicable-pattern {
      font-size: 0.9em;
      color: #444;
      margin-bottom: 10px;
    }

    .referent-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8em;
      color: #666;
      padding-top: 8px;
      border-top: 1px solid #f0f0f0;
    }
    .design-principle-tag {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 3px;
      background: #e6fffa;
      color: #00796b;
    }

    @media print {
      .card-grid { grid-template-columns: 1fr 1fr; }
      .referent-card { break-inside: avoid; }
    }
  </style>
</head>
<body>

  <div class="page" id="content">
    <!-- Rendered by JS from embedded JSON -->
  </div>

  <script id="pd-data" type="application/json">{}</script>

  <script src="_base.js"></script>
  <script>
  (function() {
    var data = PDSpec.loadData();
    if (!data) return;

    document.title = data.title || 'UX Benchmark';
    if (data.meta && data.meta.language) document.documentElement.lang = data.meta.language;

    var content = document.getElementById('content');

    // Title
    var h1 = document.createElement('h1');
    h1.textContent = data.title || 'UX Benchmark — Inter-Industry Design Referents';
    content.appendChild(h1);

    // Doc meta
    PDSpec.renderDocMeta(data.meta, content);

    // Categories
    var categories = data.categories || [];
    categories.forEach(function(cat) {
      var section = document.createElement('div');
      section.className = 'category-section';

      var h2 = document.createElement('h2');
      h2.textContent = cat.name;
      section.appendChild(h2);

      var grid = document.createElement('div');
      grid.className = 'card-grid';

      (cat.referents || []).forEach(function(ref) {
        var card = document.createElement('div');
        card.className = 'referent-card';

        // Header: name + industry badge
        var header = document.createElement('div');
        header.className = 'referent-header';
        var h3 = document.createElement('h3');
        h3.textContent = ref.name;
        header.appendChild(h3);
        var badge = document.createElement('span');
        badge.className = 'industry-badge';
        badge.textContent = ref.industry;
        header.appendChild(badge);
        card.appendChild(header);

        // Factor X
        var fx = document.createElement('div');
        fx.className = 'factor-x';
        fx.innerHTML = '<strong>Factor X:</strong> ' + PDSpec.esc(ref.factor_x);
        card.appendChild(fx);

        // Applicable pattern
        var pat = document.createElement('div');
        pat.className = 'applicable-pattern';
        pat.textContent = ref.pattern;
        card.appendChild(pat);

        // Footer: design principle + refs
        var footer = document.createElement('div');
        footer.className = 'referent-footer';

        if (ref.design_principle) {
          var principle = document.createElement('span');
          principle.className = 'design-principle-tag';
          principle.textContent = ref.design_principle;
          footer.appendChild(principle);
        }

        if (ref.refs && ref.refs.length) {
          var refsSpan = document.createElement('span');
          refsSpan.className = 'insight-ref ref-link-target';
          refsSpan.textContent = ref.refs.map(function(r) { return '[' + r + ']'; }).join(', ');
          footer.appendChild(refsSpan);
        }

        card.appendChild(footer);
        grid.appendChild(card);
      });

      section.appendChild(grid);
      content.appendChild(section);
    });

    // Convert refs to links
    PDSpec.convertRefs(content, false);
  })();
  </script>
</body>
</html>
