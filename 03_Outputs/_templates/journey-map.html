<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journey Map</title>
  <link rel="stylesheet" href="_base.css">
  <style>
    /* Journey Map: override A4 page for wide horizontal layout */
    body { padding: 20px; }
    .page {
      width: auto;
      max-width: 100%;
      min-height: auto;
      padding: 2rem;
      overflow-x: auto;
    }

    /* Header */
    .jm-header { margin-bottom: 1.5rem; }
    .jm-header h1 { font-size: 22pt; margin-bottom: 4px; }
    .jm-persona { font-size: 0.9rem; color: #666; margin-bottom: 12pt; }

    /* Grid container */
    .jm-grid {
      display: grid;
      gap: 0;
      border: 1px solid #c7c7c7;
      border-radius: 6px;
      overflow: hidden;
      min-width: max-content;
    }

    /* Row header (layer label) */
    .jm-row-header {
      background: #f8f8f8;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 10px 12px;
      border-right: 1px solid #c7c7c7;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      color: #333;
    }

    /* Column header (phase name) */
    .jm-col-header {
      background: #202124;
      color: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      padding: 10px 14px;
      text-align: center;
      border-right: 1px solid #3a3a3a;
      border-bottom: 1px solid #c7c7c7;
    }
    .jm-col-header:last-of-type { border-right: none; }

    /* Corner cell */
    .jm-corner {
      background: #202124;
      border-right: 1px solid #3a3a3a;
      border-bottom: 1px solid #c7c7c7;
    }

    /* Data cell */
    .jm-cell {
      padding: 10px 12px;
      border-right: 1px solid #e5e5e5;
      border-bottom: 1px solid #e5e5e5;
      font-size: 0.8rem;
      line-height: 1.5;
      vertical-align: top;
    }
    .jm-cell:last-child { border-right: none; }

    /* Cell items */
    .jm-item { margin-bottom: 6px; }
    .jm-item:last-child { margin-bottom: 0; }
    .jm-item-text { color: #333; }
    .jm-item-refs { font-size: 0.7rem; color: #999; font-style: italic; }

    /* Emotion valence colors */
    .jm-emotion-positive { color: #155724; }
    .jm-emotion-positive::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a3d9a5; margin-right: 6px; vertical-align: middle; }
    .jm-emotion-neutral { color: #856404; }
    .jm-emotion-neutral::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #f0d080; margin-right: 6px; vertical-align: middle; }
    .jm-emotion-negative { color: #721c24; }
    .jm-emotion-negative::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e8a0a0; margin-right: 6px; vertical-align: middle; }

    /* Pain points row highlight */
    .jm-row-pain .jm-cell { background: #fff8f8; }
    .jm-row-pain .jm-row-header { background: #fef2f2; color: #721c24; }

    /* Opportunities row highlight */
    .jm-row-opportunities .jm-cell { background: #f8fffe; }
    .jm-row-opportunities .jm-row-header { background: #ecfdf5; color: #065f46; }

    /* GAP marker */
    .jm-gap {
      font-size: 0.7rem;
      color: #856404;
      background: #fff3cd;
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px dashed #856404;
    }

    /* Legend */
    .jm-legend {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #666;
      flex-wrap: wrap;
    }
    .jm-legend-item { display: flex; align-items: center; gap: 4px; }
    .jm-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Responsive: horizontal scroll on small screens */
    @media (max-width: 768px) {
      .page { padding: 1rem; }
    }

    /* Print */
    @media print {
      .page { box-shadow: none; padding: 0; }
      .jm-grid { font-size: 9pt; }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="jm-header" id="header"></div>
    <div id="grid-container"></div>
    <div class="jm-legend" id="legend"></div>
  </div>

  <script id="pd-data" type="application/json">{}</script>

  <script src="_base.js"></script>
  <script>
  (function() {
    'use strict';

    var data = PDSpec.loadData();
    if (!data || !data.phases || !data.phases.length) return;

    var meta = data.meta || {};
    if (meta.language) document.documentElement.lang = meta.language;

    // Header
    var header = document.getElementById('header');
    var h1 = document.createElement('h1');
    h1.textContent = data.title || 'Journey Map';
    header.appendChild(h1);
    document.title = h1.textContent;

    if (data.persona) {
      var persona = document.createElement('div');
      persona.className = 'jm-persona';
      persona.textContent = 'Persona: ' + data.persona;
      header.appendChild(persona);
    }

    PDSpec.renderDocMeta(meta, header);

    // Grid layout
    var phases = data.phases;
    var cols = phases.length + 1; // +1 for row header column
    var layerKeys = ['actions', 'touchpoints', 'emotions', 'pain_points', 'opportunities'];
    var layerLabels = {
      actions: meta.language === 'es' ? 'Acciones del Usuario' : 'User Actions',
      touchpoints: meta.language === 'es' ? 'Puntos de Contacto' : 'Touchpoints',
      emotions: meta.language === 'es' ? 'Emociones' : 'Emotions',
      pain_points: meta.language === 'es' ? 'Puntos de Dolor' : 'Pain Points',
      opportunities: meta.language === 'es' ? 'Oportunidades' : 'Opportunities'
    };

    var grid = document.createElement('div');
    grid.className = 'jm-grid';
    grid.style.gridTemplateColumns = '140px repeat(' + phases.length + ', minmax(160px, 1fr))';

    // Header row: corner + phase names
    var corner = document.createElement('div');
    corner.className = 'jm-corner';
    grid.appendChild(corner);

    phases.forEach(function(phase) {
      var cell = document.createElement('div');
      cell.className = 'jm-col-header';
      cell.textContent = phase.name;
      grid.appendChild(cell);
    });

    // Layer rows
    layerKeys.forEach(function(key) {
      var rowClass = '';
      if (key === 'pain_points') rowClass = ' jm-row-pain';
      if (key === 'opportunities') rowClass = ' jm-row-opportunities';

      // Row header
      var rh = document.createElement('div');
      rh.className = 'jm-row-header' + rowClass;
      rh.textContent = layerLabels[key];
      grid.appendChild(rh);

      // Cells per phase
      phases.forEach(function(phase) {
        var cell = document.createElement('div');
        cell.className = 'jm-cell' + rowClass;

        var layer = phase.layers[key];
        if (layer && layer.items && layer.items.length) {
          layer.items.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'jm-item';

            var textSpan = document.createElement('span');
            if (key === 'emotions' && item.valence) {
              textSpan.className = 'jm-item-text jm-emotion-' + item.valence;
            } else {
              textSpan.className = 'jm-item-text';
            }
            textSpan.textContent = item.text;
            div.appendChild(textSpan);

            if (item.gap) {
              var gapSpan = document.createElement('span');
              gapSpan.className = 'jm-gap';
              gapSpan.textContent = ' [GAP]';
              div.appendChild(gapSpan);
            }

            if (item.refs && item.refs.length) {
              var refsSpan = document.createElement('span');
              refsSpan.className = 'jm-item-refs ref-link-target';
              refsSpan.textContent = ' ' + item.refs.map(function(r) { return '[' + r + ']'; }).join(' ');
              div.appendChild(refsSpan);
            }

            cell.appendChild(div);
          });
        }

        grid.appendChild(cell);
      });
    });

    document.getElementById('grid-container').appendChild(grid);

    // Legend
    var legend = document.getElementById('legend');
    var legendItems = [
      { color: '#a3d9a5', label: meta.language === 'es' ? 'Positivo' : 'Positive' },
      { color: '#f0d080', label: meta.language === 'es' ? 'Neutro' : 'Neutral' },
      { color: '#e8a0a0', label: meta.language === 'es' ? 'Negativo' : 'Negative' }
    ];
    legendItems.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'jm-legend-item';
      div.innerHTML = '<span class="jm-legend-dot" style="background:' + item.color + '"></span> ' + PDSpec.esc(item.label);
      legend.appendChild(div);
    });

    // Convert refs to links
    PDSpec.convertRefs(document.getElementById('grid-container'), false);

  })();
  </script>
</body>
</html>
