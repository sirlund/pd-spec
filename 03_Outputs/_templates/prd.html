<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD</title>
  <link rel="stylesheet" href="_base.css">
</head>
<body>

  <div class="page" id="content">
    <!-- Rendered by _base.js from embedded JSON -->
  </div>

  <script id="pd-data" type="application/json">{}</script>

  <script src="_base.js"></script>
  <script>
  (function() {
    var data = PDSpec.loadData();
    if (!data) return;

    // Set page title
    document.title = data.title || 'PRD';
    if (data.meta && data.meta.language) document.documentElement.lang = data.meta.language;

    var content = document.getElementById('content');

    // Title
    var h1 = document.createElement('h1');
    h1.textContent = data.title || 'Product Requirements Document';
    content.appendChild(h1);

    // Doc meta
    PDSpec.renderDocMeta(data.meta, content);

    // Sections
    PDSpec.renderSections(data, content);
  })();
  </script>
</body>
</html>
